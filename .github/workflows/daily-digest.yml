name: Daily Tech Digest

on:
  schedule:
    - cron: '0 5 * * *'  # 每天 UTC 5:00 = 北京时间 13:00
  workflow_dispatch:

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate digest
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `📰 科技日报 — ${today}`;
            
            const body = `# 📰 AI 科技日报 — ${today}
            
## 🔥 Top 精选
> 每日自动抓取 Hacker News & GitHub Trending 精选

### 1. AI 热点新闻
_（此部分将由 Agent 后续填充实际内容）_

### 2. 热门开源项目
_（此部分将由 Agent 后续填充实际内容）_

### 3. 学习资源推荐
_（此部分将由 Agent 后续填充实际内容）_

---
*由 Claw Agent 自动生成 · GitHub Actions 定时触发*
`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['daily-digest', 'automated']
            });
